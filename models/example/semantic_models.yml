version: 2

models:
  - name: Moj_test_2
    description: "Customer table based on Snowflake sample data."

    semantic_model:
      enabled: true
      name: customers_semantic

    columns:
      - name: C_CUSTKEY
        description: "Customer key."
        entity:
          type: primary
          name: customer

      - name: C_NAME
        description: "Customer name."
        dimension:
          type: categorical

      - name: C_NATIONKEY
        description: "Nation key."
        dimension:
          type: categorical

      - name: C_MKTSEGMENT
        description: "Market segment."
        dimension:
          type: categorical

      - name: C_ACCTBAL
        description: "Customer account balance."

    metrics:
      - name: customers_count
        description: "Total number of customers."
        type: simple
        label: Customers Count
        agg: count
        expr: C_CUSTKEY

      - name: total_account_balance
        description: "Total account balance across customers."
        type: simple
        label: Total Account Balance
        agg: sum
        expr: C_ACCTBAL

      - name: average_account_balance
        description: "Average account balance per customer."
        type: simple
        label: Average Account Balance
        agg: average
        expr: C_ACCTBAL